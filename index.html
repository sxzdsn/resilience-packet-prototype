<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resilience Packet Publisher — Prototype</title>
    <link rel="stylesheet" href="styles.css?v=20260713-11" />
  </head>
  <body>
    <main class="app-shell figma-hidden">
      <aside id="publisherSettings" class="editor-panel">
        <header class="editor-header">
          <div>
            <p class="eyebrow">Working prototype</p>
            <h1>Packet publisher</h1>
          </div>
          <span class="status-dot" title="Changes render locally"></span>
        </header>

        <details class="editor-section settings-section" aria-labelledby="cover-settings" open>
          <summary><h2 id="cover-settings">Cover</h2></summary>
          <div class="settings-section-content meta-grid">
            <label>
              Packet title
              <input id="packetTitle" value="What you need to know" />
            </label>
            <label>
              Subtitle
              <input id="packetSubtitle" value="Information Packet" />
            </label>
            <label>
              Website
              <input id="packetWebsite" value="ourresilience.org" />
            </label>
            <label>
              Year
              <input id="packetYear" value="2026" inputmode="numeric" />
            </label>
          </div>
        </details>

        <details class="editor-section settings-section" aria-labelledby="summary-graphic-settings" open>
          <summary><h2 id="summary-graphic-settings">Summary graphic</h2></summary>
          <div class="settings-section-content summary-settings">
            <p class="settings-section-intro">Special-format content for page 02.</p>
            <label>
              Headline
              <input id="summaryTitle" value="You are the boss of your own body and care." />
            </label>
            <label>
              Rights card
              <input id="summaryRights" value="You have rights as a teen, we’ll walk you through them." />
            </label>
            <fieldset class="summary-setting-group">
              <legend>Emotions card</legend>
              <label>
                Message
                <input id="summaryEmotions" value="You may be feeling a lot of emotions." />
              </label>
              <label>
                Supporting text
                <input id="summaryEmotionsDetail" value="They’re all valid and there are practical and healthy ways to process them. We’re here to help." />
              </label>
            </fieldset>
            <label>
              Confidentiality card
              <input id="summaryConfidentiality" value="We maintain absolute confidentiality with you." />
            </label>
            <fieldset class="summary-setting-group">
              <legend>Medical billing card</legend>
              <label>
                Message
                <input id="summaryBilling" value="You will not be directly billed for medical care related to your assault." />
              </label>
              <label>
                Supporting text
                <input id="summaryBillingDetail" value="This is the law in Illinois." />
              </label>
            </fieldset>
            <label>
              Resilience card
              <input id="summaryOrganization" value="We are an organization called Resilience. We’ve got your back." />
            </label>
            <label>
              Confidentiality footnote
              <textarea id="summaryFootnote" rows="3">The only exception to confidentiality is if you are in immediate danger of hurting yourself or others.</textarea>
            </label>
          </div>
        </details>

        <details class="editor-section settings-section" aria-labelledby="source-content" open>
          <summary><h2 id="source-content">Google Docs link</h2></summary>
          <div class="settings-section-content">
            <p class="settings-section-intro">Paste the link to the document that maintains this packet.</p>
            <label class="source-link-control" for="docsUrl">
              Document URL
              <input
                id="docsUrl"
                type="url"
                inputmode="url"
                autocomplete="url"
                spellcheck="false"
                value="https://docs.google.com/document/d/1u_cX62gQvb2xD770e0bpoiOryG_DKsj0DKi7_G0hUdY/edit?usp=sharing"
                placeholder="https://docs.google.com/document/d/…/edit"
              />
            </label>
            <div class="source-link-actions">
              <button id="importButton" class="primary-button" type="button">Use document link</button>
              <a id="openDocsLink" class="text-link" href="#" target="_blank" rel="noreferrer">Open Google Doc</a>
            </div>
            <p id="importSummary" class="import-summary" aria-live="polite"></p>
            <div id="docsSource" hidden></div>
          </div>
        </details>

      </aside>

      <section class="preview-panel" aria-labelledby="preview-heading">
        <header class="preview-toolbar">
          <div>
            <p class="eyebrow">Deterministic Letter layout</p>
            <h2 id="preview-heading">Paginated preview</h2>
          </div>
          <div class="preview-actions">
            <a class="toolbar-button toolbar-link" href="style-guide.html">Style system</a>
            <button
              id="toggleSettings"
              class="toolbar-button"
              type="button"
              aria-controls="publisherSettings"
              aria-expanded="true"
            >
              Hide settings
            </button>
            <button
              id="toggleFigma"
              class="toolbar-button"
              type="button"
              aria-controls="pages"
              aria-pressed="true"
            >
              Show Figma
            </button>
            <label class="zoom-control">
              Zoom
              <input id="zoomRange" type="range" min="55" max="100" value="90" />
              <span id="zoomValue">90%</span>
            </label>
            <button id="printButton" class="secondary-button" type="button">Print / Save PDF</button>
          </div>
        </header>
        <div id="renderWarnings" class="render-warnings" aria-live="polite"></div>
        <div id="printBlocker" class="print-blocker" aria-live="assertive"></div>
        <div id="pages" class="pages" aria-label="Rendered packet pages"></div>
      </section>
    </main>

    <div id="measurementStage" class="measurement-stage" aria-hidden="true"></div>
    <script src="packet-content.js?v=20260713-11"></script>
    <script src="app.js?v=20260713-11"></script>
  </body>
</html>
